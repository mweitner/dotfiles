default: true
# MD013/line-length - stricter prose wrapping while keeping practical exemptions
MD013:
  line_length: 120
  code_blocks: false
  tables: false
  links: false
# MD029/ol-prefix - keep relaxed due mixed list/code patterns in existing docs
MD029: false
# MD060/code-fence-style - enforce padded fence style
MD060:
  style: padded

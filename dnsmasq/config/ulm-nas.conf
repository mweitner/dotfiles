# Lightweight profile: ULM office 8-port switch + UGREEN NAS

# Basic DNS functionality
port=53
domain-needed
bogus-priv

# Dev-PC gateway on machine network
interface=enx00e04cb828b5
listen-address=127.0.0.1
listen-address=192.168.3.1
bind-dynamic

# Keep 192.168.3.91 reserved for NAS (exclude from dynamic pool)
dhcp-range=192.168.3.10,192.168.3.90,12h
dhcp-range=192.168.3.92,192.168.3.220,12h

# Hand out Dev-PC services to clients on this network
dhcp-option=option:router,192.168.3.1
dhcp-option=option:dns-server,192.168.3.1
dhcp-option=option:ntp-server,192.168.3.1

# Deterministic NAS name resolution in this subnet
address=/ugreen-nas/192.168.3.91

# Optional: pin NAS by MAC once known
# dhcp-host=aa:bb:cc:dd:ee:ff,192.168.3.91,infinite

# Logging for troubleshooting
log-facility=/var/log/dnsmasq.log
log-dhcp
log-queries

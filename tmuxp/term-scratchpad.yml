session_name: term-scratchpad
start_directory: ~/

windows:
  - window_name: nvim-home
    panes:
      - nvim
  - window_name: kernel logs
    panes:
      - sudo dmesg -w
  - window_name: cal
    panes:
      - bc
  - window_name: network
    panes:
      - ip a
  - window_name: screenshot
    panes:
      - >
        echo 'Manual screenshot commands (Sway):';
        echo '  grimshot save area ~/Pictures/screenshot-$(date +%F-%H%M%S).png';
        echo '  grimshot copy area';
        echo '  grimshot save output ~/Pictures/screenshot-$(date +%F-%H%M%S).png';
        exec fish
  - window_name: shell
    panes:
      - fish



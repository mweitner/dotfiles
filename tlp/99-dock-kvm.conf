# Keep dock and downstream KVM hubs out of USB autosuspend.
#
# Motivation:
# - Dell WD19TB + external KVM can take 30-50s to re-enumerate keyboard/mouse
#   after unplug/replug or after moving between USB-C ports.
# - Thunderbolt authorization completes quickly; the long delay happens later on
#   downstream USB hubs (Realtek/Terminus/Genesys) before HID devices return.
#
# Verified device IDs on the ZBook + WD19TB + KVM chain:
# - 0bda:5487  Realtek Dell dock hub (USB2)
# - 0bda:5413  Realtek Dell dock hub (USB2)
# - 0bda:0487  Realtek Dell dock hub (USB3)
# - 0bda:0413  Realtek Dell dock hub (USB3)
# - 1a40:0101  Terminus downstream hub
# - 05e3:0608  Genesys downstream hub

USB_DENYLIST="0bda:5487 0bda:5413 0bda:0487 0bda:0413 1a40:0101 05e3:0608"
